<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC 知识问答 · 挑战版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        
        body {
            background: #0a0a1a;
            color: #e0e8ff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(#1a1a3a, #0a0a1a);
            padding: 16px;
            transition: transform 0.1s;
        }
        
        body.shake {
            animation: bodyShake 0.12s infinite;
        }
        
        @keyframes bodyShake {
            0% {
                transform: translate(2px, 2px);
            }
            25% {
                transform: translate(-2px, -2px);
            }
            50% {
                transform: translate(2px, -2px);
            }
            75% {
                transform: translate(-2px, 2px);
            }
            100% {
                transform: translate(2px, 2px);
            }
        }
        /* 引导页 */
        
        .full-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #0a0a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
            text-align: center;
            padding: 30px;
        }
        
        .full-screen .big-text {
            font-size: 38px;
            color: #5c9eff;
            text-shadow: 0 0 20px #3a7bd5;
            max-width: 90%;
            line-height: 1.5;
        }
        
        .full-screen .skip-hint {
            position: absolute;
            bottom: 50px;
            font-size: 18px;
            color: #667;
        }
        /* 主标题 */
        
        .main-title {
            font-size: 38px;
            color: #5c9eff;
            text-shadow: 0 0 20px #3a7bd5;
            animation: flash 0.8s infinite alternate;
            margin-bottom: 12px;
            text-align: center;
        }
        
        @keyframes flash {
            from {
                opacity: 0.7;
                transform: scale(1);
            }
            to {
                opacity: 1;
                transform: scale(1.02);
            }
        }
        /* 游戏面板 */
        
        .game-panel {
            width: 96%;
            max-width: 860px;
            background: #141430;
            border: 2px solid #3a7bd5;
            border-radius: 18px;
            padding: 22px 18px;
            box-shadow: 0 0 40px #3a7bd566;
            margin: 8px 0;
        }
        /* 状态栏：进度、血量、计时 */
        
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 14px;
            font-size: 18px;
            font-weight: bold;
        }
        
        .status-bar .progress {
            color: #aabbdd;
        }
        
        .status-bar .hearts {
            color: #ff4466;
            font-size: 26px;
            letter-spacing: 4px;
            text-shadow: 0 0 12px #ff446688;
        }
        
        .status-bar .timer {
            background: #1e1e44;
            padding: 6px 22px;
            border-radius: 40px;
            border: 3px solid #5c9eff;
            color: #5c9eff;
            font-size: 36px;
            font-weight: 900;
            min-width: 80px;
            text-align: center;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(92, 158, 255, 0.15);
        }
        
        .status-bar .timer.warning {
            color: #ff6644;
            border-color: #ff6644;
            animation: timerPulse 0.4s infinite alternate;
            box-shadow: 0 0 40px rgba(255, 100, 68, 0.4);
        }
        
        .status-bar .timer.danger {
            color: #ff2222;
            border-color: #ff2222;
            animation: timerPulse 0.25s infinite alternate;
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.6);
        }
        
        @keyframes timerPulse {
            from {
                opacity: 0.6;
                transform: scale(0.92);
            }
            to {
                opacity: 1;
                transform: scale(1.08);
            }
        }
        /* 题目区 */
        
        .q-type {
            color: #ffcc44;
            font-size: 17px;
            font-weight: bold;
            margin-bottom: 4px;
        }
        
        .q-text {
            font-size: 22px;
            line-height: 1.6;
            margin: 8px 0 16px 0;
            min-height: 56px;
            color: #e8eeff;
        }
        
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 10px 0;
        }
        
        @media (max-width: 600px) {
            .options-grid {
                grid-template-columns: 1fr;
            }
            .main-title {
                font-size: 28px;
            }
            .q-text {
                font-size: 18px;
            }
            .status-bar {
                font-size: 15px;
            }
            .status-bar .timer {
                font-size: 28px;
                min-width: 60px;
                padding: 4px 14px;
            }
        }
        
        .option-btn {
            background: #1e1e44;
            border: 2px solid #3a5a8a;
            border-radius: 10px;
            padding: 12px 12px;
            color: #c8d8ff;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.15s;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 6px;
            min-height: 46px;
            word-break: break-word;
        }
        
        .option-btn:hover:not(:disabled) {
            background: #2a3a6a;
            border-color: #5c9eff;
            transform: scale(1.02);
        }
        
        .option-btn .letter {
            color: #5c9eff;
            font-weight: bold;
            min-width: 24px;
        }
        
        .option-btn.selected {
            background: #2a4a7a;
            border-color: #88bbff;
        }
        
        .option-btn.correct-reveal {
            background: #1a6a3a;
            border-color: #44dd88;
        }
        
        .option-btn.wrong-reveal {
            background: #6a1a2a;
            border-color: #ff4466;
        }
        
        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }
        
        .feedback-area {
            margin: 14px 0 10px 0;
            font-size: 20px;
            min-height: 36px;
            font-weight: bold;
        }
        
        .feedback-area.correct {
            color: #44dd88;
        }
        
        .feedback-area.wrong {
            color: #ff4466;
        }
        
        .feedback-area.timeout {
            color: #ff8844;
        }
        
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin: 8px 0 4px 0;
        }
        
        button {
            padding: 10px 28px;
            font-size: 18px;
            background: #2a5a8a;
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }
        
        button:hover:not(:disabled) {
            background: #3a7ad5;
            transform: scale(1.04);
        }
        
        button:disabled {
            background: #445566;
            cursor: not-allowed;
            transform: none;
        }
        
        button.btn-primary {
            background: #3a7ad5;
        }
        
        button.btn-primary:hover:not(:disabled) {
            background: #5c9eff;
        }
        
        button.btn-danger {
            background: #aa3344;
        }
        
        button.btn-danger:hover:not(:disabled) {
            background: #cc4455;
        }
        
        .hidden {
            display: none !important;
        }
        /* 失败页 —— 黑底红字 */
        
        .fail-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            text-align: center;
            padding: 30px;
        }
        
        .fail-overlay .fail-title {
            font-size: 64px;
            color: #ff2222;
            text-shadow: 0 0 40px #ff0000;
            font-weight: 900;
            animation: flash 0.5s infinite alternate;
            line-height: 1.3;
        }
        
        .fail-overlay .fail-sub {
            font-size: 34px;
            color: #ff4444;
            margin-top: 16px;
            text-shadow: 0 0 20px #ff000066;
            font-weight: bold;
        }
        
        .fail-overlay .fail-tip {
            font-size: 22px;
            color: #aa5555;
            margin-top: 40px;
            letter-spacing: 3px;
        }
        /* 结果页（过关） */
        
        .result-box {
            text-align: center;
            padding: 20px 0;
        }
        
        .result-box .big-score {
            font-size: 64px;
            color: #ffcc44;
            text-shadow: 0 0 30px #ff8800;
        }
        
        .result-box .detail {
            font-size: 20px;
            color: #aabbdd;
            margin: 10px 0;
        }
        
        .result-box .star {
            font-size: 48px;
            margin: 8px 0;
        }
        /* 自动进入下一题的倒计时指示器 */
        
        .auto-next-indicator {
            display: inline-block;
            margin-top: 6px;
            font-size: 16px;
            color: #667799;
            letter-spacing: 1px;
        }
        
        .auto-next-indicator span {
            color: #5c9eff;
            font-weight: bold;
            font-size: 20px;
        }
    </style>
</head>

        // ============================================================
        // 游戏逻辑（完全保持不变，仅替换题库）
        // ============================================================
        const TOTAL_QUESTIONS = 20;
        const INITIAL_HEARTS = 5;
        const TIME_LIMIT = 15;
        const AUTO_NEXT_DELAY = 3;

        let gameQuestions = [];
        let currentIndex = 0;
        let hearts = INITIAL_HEARTS;
        let score = 0;
        let answered = false;
        let selectedIndices = [];
        let timerInterval = null;

        let gameActive = false;
        let autoNextTimer = null;
        let autoNextCountdown = AUTO_NEXT_DELAY;

        // DOM 元素（与原来一致）
        const page1 = document.getElementById('page1');

        const gamePanel = document.getElementById('gamePanel');
        const resultPanel = document.getElementById('resultPanel');
        const failOverlay = document.getElementById('failOverlay');

        const progressText = document.getElementById('progressText');
        const heartsDisplay = document.getElementById('heartsDisplay');
        const timerDisplay = document.getElementById('timerDisplay');
        const qType = document.getElementById('qType');
        const qText = document.getElementById('qText');
        const optionsContainer = document.getElementById('optionsContainer');
        const feedbackText = document.getElementById('feedbackText');
        const confirmBtn = document.getElementById('confirmBtn');
        const restartBtn = document.getElementById('restartBtn');
        const resultRestartBtn = document.getElementById('resultRestartBtn');
        const resultStar = document.getElementById('resultStar');
        const resultScore = document.getElementById('resultScore');
        const resultDetail = document.getElementById('resultDetail');
        const resultComment = document.getElementById('resultComment');
        const failReason = document.getElementById('failReason');
        const autoNextIndicator = document.getElementById('autoNextIndicator');
        const autoNextCountdownSpan = document.getElementById('autoNextCountdown');

        const hurtBerryAudio = document.getElementById('hurtBerryAudio');
        const hurt3Audio = document.getElementById('hurt3Audio');
        const deathAudio1 = document.getElementById('deathAudio1');
        const deathAudio2 = document.getElementById('deathAudio2');

        const LETTERS = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H'];

        function playHurtBerrySound() {
            try {
                hurtBerryAudio.currentTime = 0;
                hurtBerryAudio.play().catch(e => console.log('音频播放失败:', e));
            } catch (e) {
                console.log('音频播放失败:', e);
            }
        }

        function playFailSounds() {
            try {
                hurt3Audio.currentTime = 0;
                hurt3Audio.play().catch(e => console.log('音频播放失败:', e));
                deathAudio1.currentTime = 0;
                deathAudio1.play().catch(e => console.log('音频播放失败:', e));
                deathAudio2.currentTime = 0;
                deathAudio2.play().catch(e => console.log('音频播放失败:', e));
            } catch (e) {
                console.log('音频播放失败:', e);
            }
        }

        function typeLine(elem, content, speed = 60) {
            let idx = 0;
            elem.innerText = '';
            return new Promise(resolve => {
                const t = setInterval(() => {
                    if (idx < content.length) {
                        elem.innerText += content[idx++];
                    } else {
                        clearInterval(t);
                        resolve();
                    }
                }, speed);
            });
        }

        async function startGuide() {
            await typeLine(text1, '⛏️ Minecraft 知识问答 · 生存挑战');
            page1.addEventListener('click', () => {
                page1.style.display = 'none';
                page2.style.display = 'flex';
                typeLine(text2, '❤️ 你有 5 颗心，答错扣心\n⏱️ 每题 15 秒，超时扣心');
            }, {
                once: true
            });

            page2.addEventListener('click', () => {
                page2.style.display = 'none';
                page3.style.display = 'flex';
                typeLine(text3, '📚 从 40+ 道题库中随机抽取 20 题\n✅ 全部答完且存活即为过关');
            }, {
                once: true
            });

            page3.addEventListener('click', () => {
                page3.style.display = 'none';
                page4.style.display = 'flex';
                typeLine(text4, '⚡ 你必须要在憋尿的情况下进行游戏！\n若生命耗尽，你需要接受惩罚——直接尿裤子！！');
            }, {
                once: true
            });

            page4.addEventListener('click', () => {
                page4.style.display = 'none';
                page5.style.display = 'flex';
                typeLine(text5, '⚡ 点击开始你的挑战！');
            }, {
                once: true
            });

            page5.addEventListener('click', () => {
                page5.style.display = 'none';
                gameTitle.style.display = 'block';
                gamePanel.style.display = 'block';
                initGame();
            }, {
                once: true
            });
        }

        function initGame() {
            const shuffled = [...FULL_BANK];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            gameQuestions = shuffled.slice(0, TOTAL_QUESTIONS);

            currentIndex = 0;
            hearts = INITIAL_HEARTS;
            score = 0;
            gameActive = true;
            resultPanel.style.display = 'none';
            failOverlay.style.display = 'none';
            gamePanel.style.display = 'block';
            document.body.classList.remove('shake');
            autoNextIndicator.classList.add('hidden');

            renderQuestion();
        }

        function renderQuestion() {
            if (currentIndex >= gameQuestions.length) {
                showResult(true);
                return;
            }

            const q = gameQuestions[currentIndex];
            answered = false;
            selectedIndices = [];
            confirmBtn.disabled = true;
            confirmBtn.classList.remove('hidden');
            restartBtn.classList.add('hidden');
            feedbackText.innerText = '\u00A0';
            feedbackText.className = 'feedback-area';
            document.body.classList.remove('shake');
            autoNextIndicator.classList.add('hidden');
            clearTimeout(autoNextTimer);

            progressText.innerText = `第 ${currentIndex + 1} / ${gameQuestions.length} 题`;
            qType.innerText = q.type === 'single' ? '📖 单选题' : '📚 多选题';
            qText.innerText = q.question;

            optionsContainer.innerHTML = '';
            q.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.dataset.index = idx;
                btn.innerHTML = `<span class="letter">${LETTERS[idx]}.</span> ${opt}`;
                btn.addEventListener('click', () => toggleOption(idx));
                optionsContainer.appendChild(btn);
            });

            updateHearts();

            clearInterval(timerInterval);
            timeLeft = TIME_LIMIT;
            timerDisplay.innerText = timeLeft;
            timerDisplay.className = 'timer';
            startTimer();

            confirmBtn.onclick = confirmAnswer;
            restartBtn.onclick = () => {
                initGame();
            };
            resultRestartBtn.onclick = () => {
                initGame();
            };
        }

        function toggleOption(index) {
            if (answered || !gameActive) return;
            const q = gameQuestions[currentIndex];
            const btns = optionsContainer.querySelectorAll('.option-btn');
            const btn = btns[index];

            if (q.type === 'single') {
                btns.forEach(b => b.classList.remove('selected'));
                selectedIndices = [];
                btn.classList.add('selected');
                selectedIndices.push(index);
            } else {
                if (btn.classList.contains('selected')) {
                    btn.classList.remove('selected');
                    selectedIndices = selectedIndices.filter(i => i !== index);
                } else {
                    btn.classList.add('selected');
                    selectedIndices.push(index);
                }
                selectedIndices.sort((a, b) => a - b);
            }
            confirmBtn.disabled = (selectedIndices.length === 0);
            feedbackText.innerText = '\u00A0';
            feedbackText.className = 'feedback-area';
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                timerDisplay.innerText = timeLeft;

                if (timeLeft <= 5 && timeLeft > 3) {
                    timerDisplay.className = 'timer warning';
                } else if (timeLeft <= 3) {
                    timerDisplay.className = 'timer danger';
                } else {
                    timerDisplay.className = 'timer';
                }

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    handleTimeout();
                }
            }, 1000);
        }

        function handleTimeout() {
            if (answered || !gameActive) return;
            answered = true;
            confirmBtn.disabled = true;
            document.body.classList.add('shake');

            hearts--;
            updateHearts();
            playHurtBerrySound();

            feedbackText.innerText = '⏰ 时间到！扣除 1 颗心，你的膀胱变得逐渐紧张……';
            feedbackText.className = 'feedback-area timeout';

            const q = gameQuestions[currentIndex];
            const btns = optionsContainer.querySelectorAll('.option-btn');
            btns.forEach((btn, idx) => {
                btn.disabled = true;
                if (q.answer.includes(idx)) {
                    btn.classList.add('correct-reveal');
                }
                if (selectedIndices.includes(idx) && !q.answer.includes(idx)) {
                    btn.classList.add('wrong-reveal');
                }
                btn.classList.remove('selected');
            });

            if (hearts <= 0) {
                gameActive = false;
                setTimeout(() => showFail(), 600);
                return;
            }

            scheduleAutoNext();
        }

        function confirmAnswer() {
            if (answered || !gameActive || selectedIndices.length === 0) return;
            clearInterval(timerInterval);
            const q = gameQuestions[currentIndex];
            const isCorrect = arraysEqual(selectedIndices, q.answer);
            answered = true;
            confirmBtn.disabled = true;
            document.body.classList.remove('shake');

            const btns = optionsContainer.querySelectorAll('.option-btn');
            btns.forEach((btn, idx) => {
                btn.disabled = true;
                if (q.answer.includes(idx)) {
                    btn.classList.add('correct-reveal');
                }
                if (selectedIndices.includes(idx) && !q.answer.includes(idx)) {
                    btn.classList.add('wrong-reveal');
                }
                btn.classList.remove('selected');
            });

            let heartLoss = 0;
            if (!isCorrect) {
                if (q.type === 'single') {
                    heartLoss = 1;
                } else {
                    heartLoss = 2;
                }
                hearts = Math.max(0, hearts - heartLoss);
                updateHearts();
                playHurtBerrySound();
                feedbackText.innerText = `❌ 回答错误，${q.type === 'single' ? '扣除1' : '扣除2'}颗心，你的膀胱变得更加紧张`;
                feedbackText.className = 'feedback-area wrong';
                document.body.classList.add('shake');
                setTimeout(() => document.body.classList.remove('shake'), 500);
            } else {
                score++;
                feedbackText.innerText = '✅ 回答正确！';
                feedbackText.className = 'feedback-area correct';
            }

            if (hearts <= 0) {
                gameActive = false;
                setTimeout(() => showFail(), 600);
                return;
            }

            scheduleAutoNext();
        }

        function scheduleAutoNext() {
            autoNextCountdown = AUTO_NEXT_DELAY;
            autoNextIndicator.classList.remove('hidden');
            autoNextCountdownSpan.innerText = autoNextCountdown;
            confirmBtn.classList.add('hidden');

            autoNextTimer = setInterval(() => {
                autoNextCountdown--;
                autoNextCountdownSpan.innerText = autoNextCountdown;
                if (autoNextCountdown <= 0) {
                    clearInterval(autoNextTimer);
                    autoNextIndicator.classList.add('hidden');
                    confirmBtn.classList.remove('hidden');
                    currentIndex++;
                    if (currentIndex >= gameQuestions.length) {
                        showResult(true);
                    } else {
                        renderQuestion();
                    }
                }
            }, 1000);
        }

        function showResult(won) {
            gamePanel.style.display = 'none';
            if (won) {
                resultPanel.style.display = 'block';
                const pct = Math.round((score / gameQuestions.length) * 100);
                resultScore.innerText = `${score} / ${gameQuestions.length}`;
                resultDetail.innerText = `答对 ${score} 题，正确率 ${pct}%`;
                let star, comment;
                if (pct === 100) {
                    star = '🌟🌟🌟';
                    comment = '🎉 完美通关！你是真正的 MC 大师！';
                } else if (pct >= 80) {
                    star = '🌟🌟';
                    comment = '👏 太棒了！你对 MC 的了解非常深入！';
                } else if (pct >= 60) {
                    star = '⭐';
                    comment = '👍 不错哦，继续探索吧！';
                } else {
                    star = '📖';
                    comment = '💪 多看看 Wiki，你会变得更强大！';
                }
                resultStar.innerText = star;
                resultComment.innerText = comment;
                resultRestartBtn.onclick = () => {
                    initGame();
                };
            }
        }

        function showFail() {
            gamePanel.style.display = 'none';
            resultPanel.style.display = 'none';
            failOverlay.style.display = 'flex';
            failReason.innerText = '你已耗尽所有生命';
            document.body.classList.add('shake');
            playFailSounds();
            setTimeout(() => {
                window.location.href = 'https://zh.minecraft.wiki';
            }, 3000);
        }

        function updateHearts() {
            const full = '❤️'.repeat(hearts);
            const empty = '🖤'.repeat(INITIAL_HEARTS - hearts);
            heartsDisplay.innerText = full + empty;
            if (hearts <= 2) {
                heartsDisplay.style.color = '#ff4466';
                heartsDisplay.style.textShadow = '0 0 20px #ff446688';
            } else {
                heartsDisplay.style.color = '#ff4466';
                heartsDisplay.style.textShadow = '0 0 12px #ff446688';
            }
        }

        function arraysEqual(a, b) {
            if (a.length !== b.length) return false;
            const sa = [...a].sort((x, y) => x - y);
            const sb = [...b].sort((x, y) => x - y);
            for (let i = 0; i < sa.length; i++) {
                if (sa[i] !== sb[i]) return false;
            }
            return true;
        }

        window.onload = startGuide;
    </script>
