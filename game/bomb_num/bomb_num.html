<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字炸弹 - AI对战惊险版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        
        body {
            background: #1a0000;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(#330000, #000);
            overflow: hidden;
            transition: transform 0.1s;
        }
        
        .title {
            font-size: 48px;
            color: #ff2222;
            text-shadow: 0 0 15px #ff0000;
            animation: flash 0.8s infinite alternate;
            margin-bottom: 20px;
        }
        
        @keyframes flash {
            from {
                opacity: 0.7;
                transform: scale(1);
            }
            to {
                opacity: 1;
                transform: scale(1.03);
            }
        }
        /* 统一全屏黑屏文字页（所有引导页共用样式） */
        
        .full-screen-text {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
        
        .single-line-text {
            font-size: 34px;
            color: #ff3333;
            letter-spacing: 4px;
            text-shadow: 0 0 12px #ff0000;
            white-space: nowrap;
        }
        
        .skip-hint {
            position: absolute;
            bottom: 60px;
            font-size: 18px;
            color: #666;
        }
        /* 超大AI提示区域 */
        
        .ai-big-tip {
            width: 80%;
            max-width: 600px;
            padding: 20px 10px;
            margin: 15px 0;
            background: #2b1000;
            border: 3px solid #ff9900;
            border-radius: 16px;
            box-shadow: 0 0 25px #ff7700, inset 0 0 15px #ff660055;
        }
        
        .ai-text {
            font-size: 56px;
            color: #ffdd00;
            font-weight: 900;
            text-shadow: 0 0 18px #ffaa00;
        }
        
        .ai-num {
            font-size: 72px;
            color: #ff3333;
            font-weight: bold;
            text-shadow: 0 0 22px red;
            margin-top: 8px;
        }
        
        .countdown {
            font-size: 60px;
            color: #ff4444;
            font-weight: bold;
            text-shadow: 0 0 20px red;
            margin: 10px 0;
        }
        
        .box {
            width: 90%;
            max-width: 550px;
            background: #220000;
            border: 2px solid #ff3333;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 0 30px #ff000066;
            text-align: center;
        }
        
        .range {
            font-size: 26px;
            color: #ffcc00;
            margin: 10px 0;
            font-weight: bold;
        }
        
        .tip {
            font-size: 22px;
            margin: 15px 0;
            line-height: 1.8;
            min-height: 70px;
        }
        
        input {
            width: 70%;
            height: 50px;
            font-size: 24px;
            text-align: center;
            background: #000;
            border: 2px solid #ff4444;
            color: #fff;
            border-radius: 8px;
            margin: 10px 0;
            outline: none;
        }
        
        input:focus {
            box-shadow: 0 0 10px #ff2222;
        }
        
        button {
            width: 120px;
            height: 48px;
            font-size: 20px;
            background: #ff2222;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px;
            transition: all 0.2s;
        }
        
        button:hover {
            background: #dd0000;
            transform: scale(1.05);
        }
        
        button:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
        }
        
        .history {
            margin-top: 15px;
            font-size: 16px;
            color: #ccc;
        }
        /* 全局抖动动画 */
        
        body.shake {
            animation: bodyShake 0.15s infinite;
        }
        
        @keyframes bodyShake {
            0% {
                transform: translate(3px, 3px);
            }
            25% {
                transform: translate(-3px, -3px);
            }
            50% {
                transform: translate(3px, -3px);
            }
            75% {
                transform: translate(-3px, 3px);
            }
            100% {
                transform: translate(3px, 3px);
            }
        }
        /* 失败专用样式 */
        
        .fail-tip {
            font-size: 40px;
            color: #ff2222;
            font-weight: bold;
            text-shadow: 0 0 15px red;
            margin: 15px 0;
        }
        
        .punish-remind {
            font-size: 36px;
            color: #ffcc00;
            font-weight: bold;
            text-shadow: 0 0 10px #ff8800;
            margin: 20px 0;
        }
        
        .restart-only {
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <!-- 第1页：开场 -->
    <div class="full-screen-text" id="page1">
        <div class="single-line-text" id="text1"></div>
        <div class="skip-hint">点击任意位置继续</div>
    </div>

    <!-- 第2页：规则 -->
    <div class="full-screen-text" id="page2" style="display: none;">
        <div class="single-line-text" id="text2"></div>
        <div class="skip-hint">点击任意位置继续</div>
    </div>

    <!-- 第3页：惩罚提示 -->
    <div class="full-screen-text" id="page3" style="display: none;">
        <div class="single-line-text" id="text3"></div>
        <div class="skip-hint">点击任意位置继续</div>
    </div>

    <!-- 第4页：新增页面 -->
    <div class="full-screen-text" id="page4" style="display: none;">
        <div class="single-line-text" id="text4"></div>
        <div class="skip-hint">点击任意位置进入游戏</div>
    </div>

    <!-- 游戏标题 -->
    <h1 class="title" id="gameTitle" style="display: none;">💣 数字炸弹 VS AI 💣</h1>

    <!-- 游戏主界面 -->
    <div class="ai-big-tip" id="aiBigTip" style="display: none;">
        <div class="ai-text">AI 已做出猜测！</div>
        <div class="ai-num" id="aiGuessNum">--</div>
    </div>

    <div class="countdown" id="countText" style="display: none;">--</div>

    <div class="box" id="gameBox" style="display: none;">
        <div class="range" id="rangeText">当前范围：1 ~ 100</div>
        <div class="tip" id="tipText">游戏加载中...</div>
        <input type="number" id="numInput" placeholder="请快速输入数字" disabled>
        <div>
            <button id="guessBtn" disabled>确认猜测</button>
            <button id="resetBtn" style="display: none;">重新开始</button>
        </div>
        <div class="history" id="historyText">已猜数字：无</div>
    </div>

    <!-- 失败页面（新增惩罚提醒行） -->
    <div id="failPage" style="display: none; text-align: center;">
        <div class="fail-tip" id="failMsg">你猜中了炸弹！快点尿裤子吧！</div>
        <div class="punish-remind">请自觉直接尿裤子！</div>
        <div class="restart-only">
            <button id="finalResetBtn">重新开始</button>
        </div>
    </div>

    <!-- 双音频：同时加载两首，音量统一 0.6 -->
    <audio id="deathAudio1" preload="auto" volume="0.6">
        <source src="./sound_death.mp3" type="audio/mpeg">
    
    <audio id="deathAudio2" preload="auto" volume="0.6">
        <source src="./sound_death2.mp3" type="audio/mpeg">
    

    <script>
        // 全局变量
        let minNum = 1;
        let maxNum = 100;
        let bombNum;
        let guessHistory = [];
        let timer = null;
        let remainTime = 4;
        let gameOver = false;

        // 【修复1：补全 page4 / text4 元素获取】
        const page1 = document.getElementById('page1');
        const page2 = document.getElementById('page2');
        const page3 = document.getElementById('page3');
        const page4 = document.getElementById('page4');
        const text1 = document.getElementById('text1');
        const text2 = document.getElementById('text2');
        const text3 = document.getElementById('text3');
        const text4 = document.getElementById('text4');
        const gameTitle = document.getElementById('gameTitle');

        // 游戏元素
        const body = document.body;
        const aiBigTip = document.getElementById('aiBigTip');
        const aiGuessNum = document.getElementById('aiGuessNum');
        const rangeText = document.getElementById('rangeText');
        const tipText = document.getElementById('tipText');
        const numInput = document.getElementById('numInput');
        const guessBtn = document.getElementById('guessBtn');
        const resetBtn = document.getElementById('resetBtn');
        const historyText = document.getElementById('historyText');
        const countText = document.getElementById('countText');
        const deathAudio1 = document.getElementById('deathAudio1');
        const deathAudio2 = document.getElementById('deathAudio2');
        const gameBox = document.getElementById('gameBox');
        const failPage = document.getElementById('failPage');
        const failMsg = document.getElementById('failMsg');
        const finalResetBtn = document.getElementById('finalResetBtn');

        // 四段单行文字内容
        const txt1 = "危险挑战即将开始";
        const txt2 = "AI优先猜数，你仅有4秒作答，超时即失败";
        const txt3 = "你必须在憋尿的情况下进行游戏";
        const txt4 = "如果游戏失败，你需要接受惩罚——直接尿裤子";

        // 逐字动画函数
        function typeLine(elem, content, speed = 80) {
            let index = 0;
            elem.innerText = '';
            return new Promise(resolve => {
                const t = setInterval(() => {
                    if (index < content.length) {
                        elem.innerText += content[index++];
                    } else {
                        clearInterval(t);
                        resolve();
                    }
                }, speed);
            });
        }

        // 【修复2：完整四页跳转逻辑】
        async function startGuide() {
            await typeLine(text1, txt1);
            page1.addEventListener('click', () => {
                page1.style.display = 'none';
                page2.style.display = 'flex';
                typeLine(text2, txt2);
            }, { once: true });

            page2.addEventListener('click', () => {
                page2.style.display = 'none';
                page3.style.display = 'flex';
                typeLine(text3, txt3);
            }, { once: true });

            page3.addEventListener('click', () => {
                page3.style.display = 'none';
                page4.style.display = 'flex';
                typeLine(text4, txt4);
            }, { once: true });

            // 第四页点击后进入游戏
            page4.addEventListener('click', () => {
                page4.style.display = 'none';
                gameTitle.style.display = 'block';
                gameBox.style.display = 'block';
                countText.style.display = 'block';
                initGame();
            }, { once: true });
        }

        // 随机抖动时长
        function getRandomShakeTime() {
            return Math.floor(Math.random() * 3000) + 1000;
        }

        // 初始化游戏
        function initGame() {
            clearInterval(timer);
            body.classList.remove('shake');
            gameOver = false;
            minNum = 1;
            maxNum = 100;
            bombNum = Math.floor(Math.random() * 100) + 1;
            guessHistory = [];
            remainTime = 4;

            failPage.style.display = 'none';
            aiBigTip.style.display = 'none';
            rangeText.innerText = `当前范围：${minNum} ~ ${maxNum}`;
            tipText.innerText = '游戏开始，AI 正在思考...';
            historyText.innerText = '已猜数字：无';
            countText.innerText = '--';

            numInput.disabled = true;
            guessBtn.disabled = true;
            numInput.value = '';
            resetBtn.style.display = 'none';

            setTimeout(aiGuess, 800);
        }

        // AI 猜测
        function aiGuess() {
            if (gameOver) return;
            let aiNum = Math.floor(Math.random() * (maxNum - minNum + 1)) + minNum;
            while (guessHistory.includes(aiNum)) {
                aiNum = Math.floor(Math.random() * (maxNum - minNum + 1)) + minNum;
            }

            aiGuessNum.innerText = aiNum;
            aiBigTip.style.display = 'block';
            tipText.innerText = '炸弹判定中...';
            guessHistory.push(aiNum);
            historyText.innerText = `已猜数字：${guessHistory.join('、')}`;

            const shakeTime = getRandomShakeTime();
            body.classList.add('shake');

            setTimeout(() => {
                body.classList.remove('shake');
                aiBigTip.style.display = 'none';

                if (aiNum === bombNum) {
                    gameOver = true;
                    boom(false, 'AI 猜中了炸弹！你获胜！');
                    return;
                }
                if (aiNum < bombNum) {
                    minNum = aiNum + 1;
                    tipText.innerText = '结果：数字偏小，炸弹在更大区间';
                } else {
                    maxNum = aiNum - 1;
                    tipText.innerText = '结果：数字偏大，炸弹在更小区间';
                }
                rangeText.innerText = `当前范围：${minNum} ~ ${maxNum}`;

                setTimeout(startPlayerTurn, 500);
            }, shakeTime);
        }

        // 玩家回合
        function startPlayerTurn() {
            if (gameOver) return;
            remainTime = 4;
            countText.innerText = remainTime;
            tipText.innerText = '⚡ 轮到你了！限时4秒快速猜数！';

            numInput.disabled = false;
            guessBtn.disabled = false;
            numInput.focus();

            timer = setInterval(countDown, 1000);
        }

        // 倒计时
        function countDown() {
            remainTime--;
            countText.innerText = remainTime;

            if (remainTime <= 2) {
                body.classList.add('shake');
            }

            if (remainTime <= 0) {
                clearInterval(timer);
                gameOver = true;
                boom(true, '时间耗尽！炸弹爆炸！');
            }
        }

        // 玩家提交猜测
        function playerGuess() {
            if (gameOver) return;
            const val = parseInt(numInput.value);

            if (isNaN(val)) {
                tipText.innerText = '⚠️ 请输入有效数字！';
                return;
            }
            if (val < minNum || val > maxNum) {
                tipText.innerText = `⚠️ 请输入 ${minNum}~${maxNum} 范围内数字`;
                return;
            }
            if (guessHistory.includes(val)) {
                tipText.innerText = '⚠️ 该数字已猜过！';
                return;
            }

            clearInterval(timer);
            body.classList.remove('shake');
            numInput.disabled = true;
            guessBtn.disabled = true;
            countText.innerText = '--';

            tipText.innerText = '炸弹判定中...';
            guessHistory.push(val);
            historyText.innerText = `已猜数字：${guessHistory.join('、')}`;

            const shakeTime = getRandomShakeTime();
            body.classList.add('shake');

            setTimeout(() => {
                body.classList.remove('shake');
                if (val === bombNum) {
                    gameOver = true;
                    boom(true, '你猜中了炸弹！快点尿裤子吧！');
                    return;
                }
                if (val < bombNum) {
                    minNum = val + 1;
                    tipText.innerText = '结果：数字偏小，炸弹在更大区间';
                } else {
                    maxNum = val - 1;
                    tipText.innerText = '结果：数字偏大，炸弹在更小区间';
                }
                rangeText.innerText = `当前范围：${minNum} ~ ${maxNum}`;
                numInput.value = '';

                setTimeout(aiGuess, 500);
            }, shakeTime);
        }

        // 游戏结束 + 双音频播放
        function boom(isPlayerLose, msg) {
            clearInterval(timer);
            body.classList.add('shake');
            countText.innerText = '0';
            aiBigTip.style.display = 'none';

            gameBox.style.display = 'none';
            countText.style.display = 'none';
            failMsg.innerText = msg;
            failPage.style.display = 'block';

            // 失败时同时播放两个音效
            if (isPlayerLose) {
                deathAudio1.currentTime = 0;
                deathAudio2.currentTime = 0;
                deathAudio1.play().catch(e => {});
                deathAudio2.play().catch(e => {});
            }
        }

        // 事件绑定
        guessBtn.addEventListener('click', playerGuess);
        finalResetBtn.addEventListener('click', () => {
            gameBox.style.display = 'block';
            countText.style.display = 'block';
            initGame();
        });
        numInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') playerGuess();
        });

        // 页面加载 → 启动全屏黑屏逐字引导
        window.onload = startGuide;
    </script>
</body>
</html>
