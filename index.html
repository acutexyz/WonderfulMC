<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Wonderful Minecraft | 精彩纷呈的世界</title>
    <style>
        /* 全局样式 */
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e6f7ff;
            color: #333;
            overflow-x: hidden;
            background-image: linear-gradient(rgba(230, 247, 255, 0.9), rgba(230, 247, 255, 0.9)), url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="50" height="50" fill="%23c2e6ff"/><rect x="50" y="50" width="50" height="50" fill="%23c2e6ff"/></svg>');
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        /* 图片区域样式 */
        
        .image-container {
            height: 75vh;
            width: 100%;
            position: relative;
            margin-bottom: 30px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            border: 4px solid #4db8ff;
        }
        
        .main-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        
        .image-container:hover .main-image {
            transform: scale(1.03);
        }
        
        .image-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.6));
            padding: 20px;
            color: white;
            text-align: center;
        }
        /* 标题样式 */
        
        .title-container {
            text-align: center;
            padding: 40px 20px;
            margin-top: 20px;
        }
        
        .main-title {
            font-size: 4.5rem;
            font-weight: 700;
            text-shadow: 3px 3px 0 #b3e0ff, 6px 6px 0 rgba(0, 0, 0, 0.1);
            line-height: 1.2;
            margin-bottom: 20px;
            color: #1c9dd5;
            letter-spacing: 2px;
            font-family: 'Minecraft', 'Segoe UI', sans-serif;
        }
        
        .subtitle {
            font-size: 2.5rem;
            color: #006699;
            font-weight: 600;
            text-shadow: 2px 2px 0 #b3e0ff;
            letter-spacing: 1px;
            font-family: 'Minecraft', 'Segoe UI', sans-serif;
        }
        /* 按钮容器 + 并排布局 (flex 现代化方案) */
        
        .wiki-button-container {
            text-align: center;
            margin-top: 50px;
            margin-bottom: 40px;
            /* 使用 flex 布局让两个按钮完美并排，且自动居中 */
            display: flex;
            justify-content: center;
            gap: 32px;
            flex-wrap: wrap;
        }
        /* 双按钮公用样式 (保留原 wiki-button 所有视觉效果) */
        
        .wiki-button {
            display: inline-block;
            padding: 18px 48px;
            font-size: 2rem;
            font-weight: bold;
            color: #ffffff;
            background: linear-gradient(180deg, #1c9dd5 0%, #006699 100%);
            border: 3px solid #003d5e;
            border-radius: 12px;
            text-decoration: none;
            letter-spacing: 4px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.25), inset 0 2px 0 rgba(255, 255, 255, 0.3);
            transition: all 0.2s ease;
            font-family: 'Minecraft', 'Segoe UI', sans-serif;
            text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.3);
            position: relative;
            cursor: pointer;
        }
        
        .wiki-button:hover {
            background: linear-gradient(180deg, #0077b3 0%, #004466 100%);
            border-color: #002233;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.35), inset 0 2px 0 rgba(255, 255, 255, 0.4);
        }
        
        .wiki-button:active {
            transform: translateY(0);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        /* 装饰像素边框 */
        
        .pixel-border {
            position: relative;
            margin: 0 auto;
            width: 90%;
        }
        
        .pixel-border::before,
        .pixel-border::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: #4db8ff;
        }
        
        .pixel-border::before {
            top: -10px;
            left: -10px;
        }
        
        .pixel-border::after {
            bottom: -10px;
            right: -10px;
        }
        /* 响应式设计：手机屏幕两个按钮依然精致并排，若宽度不足则换行居中 */
        
        @media (max-width: 680px) {
            .wiki-button-container {
                gap: 20px;
            }
            .wiki-button {
                padding: 14px 32px;
                font-size: 1.5rem;
                letter-spacing: 2px;
            }
        }
        
        @media (max-width: 550px) {
            .wiki-button {
                padding: 12px 24px;
                font-size: 1.3rem;
                letter-spacing: 1px;
            }
            .wiki-button-container {
                gap: 16px;
            }
        }
        
        @media (max-width: 480px) {
            .wiki-button {
                padding: 10px 20px;
                font-size: 1.2rem;
            }
        }
        /* 原响应式兼容 (保留之前的媒体查询) */
        
        @media (max-width: 768px) {
            .main-title {
                font-size: 3rem;
            }
            .subtitle {
                font-size: 1.8rem;
            }
            .image-container {
                height: 60vh;
            }
        }
        
        @media (max-width: 480px) {
            .main-title {
                font-size: 2.2rem;
            }
            .subtitle {
                font-size: 1.4rem;
            }
            .image-container {
                height: 50vh;
            }
        }
        /* 像素化字体导入 */
        
        @font-face {
            font-family: 'Minecraft';
            src: url('https://fonts.cdnfonts.com/s/14550/Minecraft.woff') format('woff');
            font-display: swap;
        }
        /* 装饰方块背景动画 */
        
        .floating-cubes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        
        .cube {
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: rgba(77, 184, 255, 0.3);
            animation: float 15s infinite linear;
        }
        
        @keyframes float {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }
        /* 精致的小点缀: 按钮焦点优化 */
        
        .wiki-button:focus-visible {
            outline: 3px solid #ffcc00;
            outline-offset: 4px;
            border-radius: 12px;
        }
    </style>
</head>

<body>
    <div class="floating-cubes" id="cubes-container"></div>

    <div class="container">
        <div class="image-container">
            <!-- 原有主视觉图 请确保 index_header.jpg 存在 -->
            <img src="./index_header.jpg" alt="Minecraft 奇妙景观：蓝天绿树与像素世界" class="main-image">
            <div class="image-overlay">
                <p>探索无限可能的世界</p>
            </div>
        </div>

        <div class="title-container pixel-border">
            <h1 class="main-title">Wonderful Minecraft</h1>
            <h2 class="subtitle">精彩纷呈的世界</h2>
        </div>

        <!-- 按钮区域: 两个按钮并排显示 —— 新增「进入游戏」按钮与 Wiki 并肩 -->
        <div class="wiki-button-container">
            <!-- 原有的 Wiki 入口 -->
            <a href="./wiki/main.html" class="wiki-button">📖 进入 Wiki</a>
            <!-- 新增的游戏入口，链接指向 ./game/main.html 完全符合需求 -->
            <a href="./game/main.html" class="wiki-button">🎮 进入游戏</a>
        </div>
    </div>

    <script>
        // 创建漂浮方块背景 (增强 Minecraft 像素氛围)
        document.addEventListener('DOMContentLoaded', function() {
            const cubesContainer = document.getElementById('cubes-container');
            // 防止重复生成清空，但初始无内容，直接创建即可
            if (cubesContainer) {
                const cubeCount = 36; // 稍微增加方块数量使背景更生动
                // 清空已有元素避免重复（一般最初是空，但为了安全）
                cubesContainer.innerHTML = '';

                for (let i = 0; i < cubeCount; i++) {
                    const cube = document.createElement('div');
                    cube.classList.add('cube');

                    // 随机位置和大小: 6px ~ 26px 不等更像素化
                    const size = Math.random() * 20 + 6;
                    cube.style.width = `${size}px`;
                    cube.style.height = `${size}px`;
                    cube.style.left = `${Math.random() * 100}vw`;
                    cube.style.top = `${Math.random() * 100}vh`;

                    // 丰富蓝色系 & 偶尔草绿色点题 Minecraft
                    const colors = ['#4db8ff', '#66ccff', '#3399ff', '#99ddff', '#00aaff', '#7ac943', '#5aa32c'];
                    cube.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    cube.style.opacity = Math.random() * 0.6 + 0.2;

                    // 随机动画延迟和持续时间，制造错落感
                    cube.style.animationDelay = `${Math.random() * 15}s`;
                    cube.style.animationDuration = `${Math.random() * 12 + 12}s`;

                    cubesContainer.appendChild(cube);
                }
            }
        });
    </script>
</body>

</html>
